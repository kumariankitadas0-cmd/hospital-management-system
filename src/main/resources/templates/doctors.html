<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Doctor Directory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">

    <div class="row mb-4 align-items-center">
        <div class="col-md-6">
            <h2 class="text-success fw-bold">Hospital Staff: Doctors</h2>
        </div>
        <div class="col-md-6 text-end">
            <a th:href="@{/}" class="btn btn-outline-secondary me-2">Back to Patients</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/showNewDoctorForm}" class="btn btn-success shadow-sm me-2">+ Add New Doctor</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Doctor Name</th>
                    <th>Department / Specialty</th>
                    <th sec:authorize="hasRole('ADMIN')" class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="doctor : ${listDoctors}">
                    <td th:text="${doctor.id}" class="fw-bold"></td>
                    <td th:text="${doctor.name}" class="text-primary fw-bold"></td>
                    <td th:text="${doctor.department}"></td>

                    <td sec:authorize="hasRole('ADMIN')" class="text-center">
                        <a th:href="@{/deleteDoctor/{id}(id=${doctor.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to remove this doctor?');">Remove</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listDoctors)}">
                    <td colspan="4" class="text-center text-muted p-4">No doctors currently in the system.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
