<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hospital Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card delay-1 p-5 mt-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold" style="color: var(--coffee-dark);">Staff Portal</h3>
                    <p style="color: var(--coffee-medium);">Sign in to your account</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger" style="background: rgba(220,53,69,0.2); border: none; color: #842029;">Invalid Email or Password.</div>
                <div th:if="${param.logout}" class="alert alert-success" style="background: rgba(25,135,84,0.2); border: none; color: #0f5132;">You have been logged out.</div>

                <form th:action="@{/login}" method="post">
                    <div class="form-floating mb-3">
                        <input class="form-control bg-transparent" style="border: 1px solid var(--coffee-medium); color: var(--coffee-dark);" id="username" type="email" name="username" placeholder="name@example.com" required/>
                        <label for="username" style="color: var(--coffee-dark);">Email address</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input class="form-control bg-transparent" style="border: 1px solid var(--coffee-medium); color: var(--coffee-dark);" id="password" type="password" name="password" placeholder="Password" required/>
                        <label for="password" style="color: var(--coffee-dark);">Password</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button class="btn btn-pistachio btn-lg py-3" type="submit">Login to Dashboard</button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <div class="small"><a th:href="@{/register}" style="color: var(--coffee-dark); font-weight: 600; text-decoration: none;">Need an account? Sign up!</a></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
