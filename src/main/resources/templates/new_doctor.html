<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card delay-1 p-5">
                <h3 class="fw-bold mb-4 text-center" style="color: var(--coffee-dark);">Add a New Doctor</h3>

                <form action="#" th:action="@{/saveDoctor}" th:object="${doctor}" method="POST">

                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: var(--coffee-dark);">Doctor Name</label>
                        <input type="text" th:field="*{name}" class="form-control bg-light border-0" placeholder="e.g. Dr. Jane Smith" required>
                    </div>

                    <div class="mb-5">
                        <label class="form-label fw-bold" style="color: var(--coffee-dark);">Department / Specialty</label>
                        <input type="text" th:field="*{department}" class="form-control bg-light border-0" placeholder="e.g. Pediatrics" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/doctors}" class="btn btn-outline-dark px-4 py-2">Cancel & Return</a>
                        <button type="submit" class="btn btn-pistachio px-5 py-2">Save Doctor</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
