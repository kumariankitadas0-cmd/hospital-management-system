<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">

    <div class="row mb-4 align-items-center">
        <div class="col-md-6">
            <h2 class="text-primary fw-bold">My Account Profile</h2>
        </div>
        <div class="col-md-6 text-end">
            <a th:href="@{/}" class="btn btn-outline-secondary">Back to Dashboard</a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Account Details</h5>
                </div>
                <div class="card-body p-4">

                    <div th:if="${param.success}" class="alert alert-success">Password updated successfully!</div>

                    <div class="mb-3">
                        <label class="text-muted fw-bold">Full Name</label>
                        <p class="fs-5" th:text="${user.name}"></p>
                    </div>

                    <div class="mb-4">
                        <label class="text-muted fw-bold">Email Address (Login ID)</label>
                        <p class="fs-5" th:text="${user.email}"></p>
                    </div>

                    <hr>

                    <h5 class="mt-4 mb-3 text-danger">Change Password</h5>
                    <form th:action="@{/profile/updatePassword}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">New Password</label>
                            <input type="password" name="newPassword" class="form-control" placeholder="Enter new password" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-warning fw-bold">Update Password</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
